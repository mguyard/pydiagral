name: Generate Release and publish to PyPI + Doc Generation

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment:
      name: Semver
    outputs:
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install hatchling twine

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          DEBUG: semantic-release:*

      - name: Show version
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo ${{ steps.semantic.outputs.new_release_version }}
          echo ${{ steps.semantic.outputs.new_release_major_version }}
          echo ${{ steps.semantic.outputs.new_release_minor_version }}
          echo ${{ steps.semantic.outputs.new_release_patch_version }}

      - name: Build package
        if: steps.semantic.outputs.new_release_published == 'true'
        run: python -m hatchling build
        env:
          PYPROJECT_VERSION: ${{ steps.semantic.outputs.new_release_version }}

      - name: Publish to PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        run: twine upload dist/* --skip-existing -u __token__ -p "${{ secrets.PYPI_TOKEN }}"

  check-doc-changes:
    runs-on: ubuntu-latest
    outputs:
      doc_changed: ${{ steps.filter.outputs.doc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check for doc changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            doc:
              - 'docs/**'
              - 'mkdocs.yml'

  deploy-docs:
    runs-on: ubuntu-latest
    needs: [release, check-doc-changes]
    if: |
      needs.release.outputs.new_release_published == 'true' ||
      needs.check-doc-changes.outputs.doc_changed == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.release || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Resolve package version
        id: version
        run: |
          if [ "${{ needs.release.outputs.new_release_published }}" == "true" ]; then
            echo "PYPROJECT_VERSION=${{ needs.release.outputs.new_release_version }}" >> $GITHUB_ENV
          else
            LATEST=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest \
              | grep '"tag_name"' \
              | sed 's/.*"tag_name": "v\([^"]*\)".*/\1/')
            echo "PYPROJECT_VERSION=$LATEST" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mkdocs mkdocstrings[python] mkdocs-material
          pip install -e .

      - name: Build documentation
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
