name: PyTest

on:
  push:
    branches:
      - dev
    paths:
      - 'src/pydiagral/**'
  pull_request:
    branches:
      - dev
    paths:
      - 'src/pydiagral/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run pyTest on'
        required: true
        default: 'dev'
        type: choice
        options:
          - main
          - beta
          - dev
  schedule:
    # Test every week on Monday at 1:00 AM
    - cron: '0 1 * * 1'

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'  # Since HA 2026.3, we require Python 3.14

    - name: Set the PYPROJECT_VERSION environment variable
      run: echo "PYPROJECT_VERSION=0.1.0-dev" >> $GITHUB_ENV

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel hatchling
        pip install pytest pytest-asyncio pytest-html pytest-cov

    - name: Install pydiagral
      run: |
        pip install --upgrade hatchling
        pip install -e .

    - name: Run tests
      run: |
        pytest -v --html=report.html --self-contained-html --cov=src/pydiagral --cov-report=xml:coverage.xml --junitxml=junit.xml

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: pytest-report
        path: report.html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        flags: unittests
        name: codecov-pydiagral
        fail_ci_if_error: false

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: junit.xml
        flags: unittests
        report_type: test_results
        fail_ci_if_error: false